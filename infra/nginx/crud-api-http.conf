# crud-api-http.conf — HTTP-only config used before SSL certs are issued.
# Replace with crud-api.conf after running: certbot --nginx -d DOMAIN
upstream crud_api_backend_http {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_DOMAIN_API;

    access_log /var/log/nginx/crud-api.access.log main;
    error_log  /var/log/nginx/crud-api.error.log warn;

    limit_req zone=api_limit burst=200 nodelay;
    limit_req_status 429;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass         http://crud_api_backend_http;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    location = /health {
        limit_req off;
        proxy_pass http://crud_api_backend_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }
}
