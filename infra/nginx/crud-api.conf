# ── Upstream definition ───────────────────────────────────────────────────────
# FastAPI runs on localhost:8000 (systemd service: crud-api)
# Binding to 127.0.0.1 means port 8000 is never exposed to the internet —
# only Nginx (on 80/443) can reach it.
upstream crud_api_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name SERVER_DOMAIN_API;  # replaced by configure-nginx.sh

    # Allow Let's Encrypt ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS virtual host ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SERVER_DOMAIN_API;  # replaced by configure-nginx.sh

    # ── SSL certificates (managed by Certbot / Let's Encrypt) ────────────
    ssl_certificate     /etc/letsencrypt/live/SERVER_DOMAIN_API/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SERVER_DOMAIN_API/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (app-specific additions to global set) ──────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # 100 req/s with burst of 200; excess requests get 429, not queued
    limit_req zone=api_limit burst=200 nodelay;
    limit_req_status 429;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/crud-api.access.log main;
    error_log  /var/log/nginx/crud-api.error.log warn;

    # ── Proxy to FastAPI ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://crud_api_backend;
        proxy_http_version 1.1;

        # Required for keepalive connections to upstream
        proxy_set_header Connection "";

        # Pass real client info to the app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — long enough for normal API calls, short enough to fail fast
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffer settings — small API responses, no need for large buffers
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Health endpoint — bypass rate limiting so Jenkins can always reach it
    location = /health {
        limit_req off;
        proxy_pass         http://crud_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }
}
