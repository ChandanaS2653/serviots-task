# ── Upstream definition ───────────────────────────────────────────────────────
# Multi-Auth Express server runs on localhost:3000 (managed by PM2)
# Port 3000 is NOT open on the EC2 security group — Nginx is the only entry point.
upstream multiauth_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name SERVER_DOMAIN_APP;  # replaced by configure-nginx.sh

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS virtual host ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SERVER_DOMAIN_APP;  # replaced by configure-nginx.sh

    # ── SSL certificates ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/SERVER_DOMAIN_APP/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SERVER_DOMAIN_APP/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP allows scripts/styles needed for the React frontend
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # ── Rate limiting ─────────────────────────────────────────────────────
    limit_req zone=app_limit burst=200 nodelay;
    limit_req_status 429;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/multiauth.access.log main;
    error_log  /var/log/nginx/multiauth.error.log warn;

    # ── Serve React static build from Express ─────────────────────────────
    location / {
        proxy_pass         http://multiauth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";  # needed if app uses websockets
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }

    # ── API routes — no caching ───────────────────────────────────────────
    location /api/ {
        limit_req off;  # API routes get their own handling at Express level
        proxy_pass         http://multiauth_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Health check endpoint — bypass rate limiting ───────────────────────
    location = /health {
        limit_req off;
        proxy_pass         http://multiauth_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }
}
